<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Cliente</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f9;
        }

        header {
            background: #2c2c2c;
            color: #fff;
            padding: 15px;
        }

        header a {
            color: #fff;
            text-decoration: none;
            margin-right: 15px;
        }

        .container {
            padding: 30px;
        }

        form {
            max-width: 500px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        label {
            display: block;
            margin-top: 15px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
        }

        button {
            margin-top: 20px;
            padding: 10px;
            background: #6a11cb;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <a href="../dashboard.html">⬅ Voltar ao Dashboard</a>
</header>

<div class="container">
    <h2>Cadastrar Cliente</h2>

    <form>
        <label>Nome</label>
        <input type="text">

        <label>CPF</label>
        <input type="text">

        <label>Telefone</label>
        <input type="text">

        <label>Email</label>
        <input type="email">

        <button type="submit">Salvar</button>
    </form>
</div>

</body>
</html>
